apiVersion: apps/v1
kind: Deployment
metadata:
  name: node todo app-deployment
  namespace: project-820120f1-fd46-4012-bd42-09b7bf997412
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node todo app
  template:
    metadata:
      labels:
        app: node todo app
    spec:
      containers:
        - name: node todo app
          image: node todo app:latest
          ports:
            - containerPort: 3000
