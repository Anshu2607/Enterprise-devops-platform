apiVersion: apps/v1
kind: Deployment
metadata:
  name: node todo app-deployment
  namespace: project-6461bec0-5d76-4405-bbaf-45bb4599cdaf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node todo app
  template:
    metadata:
      labels:
        app: node todo app
    spec:
      containers:
        - name: node todo app
          image: node todo app:latest
          ports:
            - containerPort: 3000
