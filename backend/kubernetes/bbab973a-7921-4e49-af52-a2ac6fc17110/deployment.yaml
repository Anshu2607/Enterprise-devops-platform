apiVersion: apps/v1
kind: Deployment
metadata:
  name: node todo app-deployment
  namespace: project-bbab973a-7921-4e49-af52-a2ac6fc17110
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node todo app
  template:
    metadata:
      labels:
        app: node todo app
    spec:
      containers:
        - name: node todo app
          image: node todo app:latest
          ports:
            - containerPort: 3000
